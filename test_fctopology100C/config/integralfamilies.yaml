integralfamilies:
  - name: "fctopology100C"
    loop_momenta: [k1, k2]
    top_level_sectors: [31]
    propagators:
      - ["k2",       "0"]   # l2 → k2
      - ["k1+k2",    "0"]   # l1+l2 → k1+k2
      - ["p1+k1",    "0"]   # k2+l1 → p1+k1  (p1 = our k2)
      - ["k1-q2",    "0"]   # l1-p2 → k1-q2  (q2 = our p2)
      - ["p1-k2",    "0"]   # k2-l2 → p1-k2
      - ["k1+p2",    "0"]   # extra: l1+p1 → k1+p2  (p2 = our p1)
      - ["k2+p2",    "0"]   # extra: l2+p1 → k2+p2
